kind = "web"
previewPath = "/"
title = "Project Kritagyata"
version = "1.0.0"
id = "artifacts/kritagyata"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24380

[services.development]
run = "pnpm --filter @workspace/kritagyata run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kritagyata", "run", "build" ]
publicDir = "artifacts/kritagyata/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24380"
BASE_PATH = "/"
